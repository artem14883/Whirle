<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Whirl password.">
    <link rel="icon" type="image/svg+xml" href="img/logo.svg">
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Material+Icons+Round:regular" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
    <title>Reset password — Whirl</title>
</head>

<body>
    <div class="page">
        <div data-include="header"></div>

        <main class="main">
            <section class="page-section">
                <div class="container">
                    <div class="form-card">
                        <h1 class="form-card__title">Reset your password</h1>
                        <p class="form-card__text">Enter your email — we'll send a reset link.</p>

                        <form data-handler="reset" data-success="Check your inbox for a reset link." novalidate>
                            <div class="form__row">
                                <label class="form__label" for="reset-email">Email</label>
                                <input class="form__input" id="reset-email" name="email" type="email" required autocomplete="email">
                            </div>
                            <button class="form__submit" type="submit">Send reset link</button>
                            <p class="form__status" data-form-status></p>
                            <p class="form__hint"><a href="signin.html">Back to sign in</a></p>
                        </form>
                    </div>
                </div>
            </section>
        </main>

        <div data-include="footer"></div>
    </div>
</body>

</html>
